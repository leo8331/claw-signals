<script>
// Entrance animation
window.addEventListener('load', function() {
  setTimeout(function() {
    document.body.classList.add('entrance-ready');
  }, 50);
});

// Module cycle — 4 modules
var moduleUrls = [
  '../每日选股/index.html',
  '../行业排行/index.html',
  '../价值投资/index.html',
  '../回测报告/index.html'
];
var currentModIdx = 0;

function goHome() { window.location.href = '../index.html'; }
function cycleModule() {
  var next = (currentModIdx + 1) % 4;
  window.location.href = moduleUrls[next];
}

// Overlay menu
function openModuleMenu() {
  document.getElementById('overlayBg').classList.add('open');
  document.getElementById('overlayMenu').classList.add('open');
}
function closeModuleMenu() {
  document.getElementById('overlayBg').classList.remove('open');
  document.getElementById('overlayMenu').classList.remove('open');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModuleMenu();
});
</script>
