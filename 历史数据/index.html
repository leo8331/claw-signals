<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>历史数据 · CLAW</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1419;color:#e1e8ed;font-family:system-ui,sans-serif;min-height:100vh;padding:24px}
nav{background:#192734;padding:0;border-bottom:1px solid #38444d;position:sticky;top:0;z-index:100}
.nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:24px;padding:12px 24px}
.nav-home{font-size:16px;font-weight:700;color:#1da1f2}
.nav-home:hover{text-decoration:none}
.nav-link{font-size:14px;color:#8899a6;transition:color .2s}
.nav-link:hover{color:#e1e8ed;text-decoration:none}
.nav-active{color:#f5a623!important}
a{color:#1da1f2;text-decoration:none}
a:hover{text-decoration:underline}
main{max-width:720px;margin:0 auto;padding:24px}
h2{font-size:20px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #1da1f2;display:flex;align-items:center;gap:8px}
h2 .emoji{font-size:24px}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:16px}
td{padding:10px 14px;border-bottom:1px solid #192734}
tr:hover td{background:#1a2a3a}
td a{color:#1da1f2;font-weight:600}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:6px}
.tag-sig{background:#0d3320;color:#17bf63}
.tag-sec{background:#1a2d40;color:#1da1f2}
.empty{text-align:center;color:#5c6e7e;padding:40px;font-size:14px}
footer{text-align:center;color:#5c6e7e;font-size:11px;padding:24px;border-top:1px solid #192734;margin-top:40px}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../" class="nav-home">← CLAW</a>
    <a href="../" class="nav-link">首页</a>
    <a href="../每日选股/" class="nav-link">每日选股</a>
    <a href="../行业排行/" class="nav-link">行业排行</a>
    <a href="../价值投资/" class="nav-link">价值投资</a>
    <a href="./" class="nav-link nav-active">历史数据</a>
  </div>
</nav>

<main>
<h2><span class="emoji">📅</span> 历史数据存档</h2>
<p style="font-size:13px;color:#8899a6;margin-bottom:16px">
  所有自动生成的每日选股信号和行业排行均按日期存档，点击可回溯任意交易日的数据。
</p>
<table id="archive-table">
  <tr><th style="text-align:left;padding:10px 14px;background:#192734;color:#8899a6;font-weight:600;border-bottom:2px solid #38444d">日期</th>
  <th style="text-align:left;padding:10px 14px;background:#192734;color:#8899a6;font-weight:600;border-bottom:2px solid #38444d">选股信号</th>
  <th style="text-align:left;padding:10px 14px;background:#192734;color:#8899a6;font-weight:600;border-bottom:2px solid #38444d">行业排行</th></tr>
</table>
<div id="loading" class="empty">加载中...</div>
</main>

<footer>CLAW 量化投研系统 · 历史数据存档 · 2026</footer>

<script>
fetch('../').then(r=>r.text()).then(h=>{
  const matches=[...h.matchAll(/href="历史数据\/(\d{4}-\d{2}-\d{2})\//g)];
  const dates=matches.map(m=>m[1]);
  if(!dates.length){
    document.getElementById('loading').textContent='暂无历史数据';
    return;
  }
  document.getElementById('loading').style.display='none';
  const table=document.getElementById('archive-table');
  dates.forEach((d,i)=>{
    const tr=document.createElement('tr');
    const tag=i===0?'<span class="tag tag-sig">最新</span>':'';
    const tagSec=i===0?'<span class="tag tag-sec">最新</span>':'';
    tr.innerHTML=`<td><a href="./${d}/">${d}</a></td>`+
      `<td><a href="./${d}/">选股信号</a>${tag}</td>`+
      `<td><a href="./${d}/sector.html">行业排行</a>${tagSec}</td>`;
    table.appendChild(tr);
  });
}).catch(()=>{document.getElementById('loading').textContent='加载失败，请刷新页面';});
</script>

</body>
</html>
